<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Info Receiver</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #05070b;
            --panel: rgba(255, 255, 255, 0.075);
            --panel-strong: rgba(255, 255, 255, 0.11);
            --border: rgba(255, 255, 255, 0.14);
            --text: #f5f7fb;
            --muted: #aab2c0;
            --dim: #687080;
            --accent: #62c8ff;
            --warn: #ffd166;
            --temp-high: #ff6b4a;
            --temp-low: #5eb3ff;
            --pop-color: #87ceeb;
            /* FHD(1920x1080)基準。Nest Hub は JS で data-layout を切り替え */
            --u: calc(min(100vw / 128, 100vh / 72) * 1.15);
            --safe-x: calc(var(--u) * 1.6);
            --safe-y: calc(var(--u) * 1.4);
            --gap: calc(var(--u) * 1.1);
            --radius: calc(var(--u) * 1.5);
        }

        html[data-layout="nest-hub"] {
            --u: calc(min(100vw / 128, 100vh / 80) * 1.12);
            --safe-x: calc(var(--u) * 1.2);
            --safe-y: calc(var(--u) * 1.0);
            --gap: calc(var(--u) * 0.85);
            --radius: calc(var(--u) * 1.2);
        }

        html[data-layout="fhd"] {
            --u: calc(min(100vw / 128, 100vh / 72) * 1.15);
        }

        * { box-sizing: border-box; }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 0%, rgba(45, 120, 190, 0.26), transparent 34%),
                radial-gradient(circle at 95% 15%, rgba(70, 160, 220, 0.14), transparent 30%),
                var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            /* TV / Nest Hub のオーバースキャン対策 */
            padding: var(--safe-y) var(--safe-x);
        }

        #app {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 0.88fr 2.12fr;
            gap: var(--gap);
            min-width: 0;
            min-height: 0;
        }

        .column,
        .main-area {
            display: grid;
            gap: var(--gap);
            min-width: 0;
            min-height: 0;
        }

        .left { grid-template-rows: auto auto 1fr; }
        .main-area { grid-template-rows: calc(var(--u) * 15.5) 1fr auto; }
        .top-row {
            display: grid;
            grid-template-columns: 1.02fr 0.98fr;
            gap: var(--gap);
            min-width: 0;
            min-height: 0;
        }

        /* リスト形式は使わない。常に週間カレンダーを表示 */
        .schedule-panel { display: none !important; }
        .week-panel { display: flex; }

        .panel {
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--panel);
            box-shadow: 0 calc(var(--u) * 1.2) calc(var(--u) * 2.8) rgba(0, 0, 0, 0.22);
        }

        .clock-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: calc(var(--u) * 0.95) calc(var(--u) * 0.85);
        }

        .clock-display {
            position: relative;
            display: inline-block;
            line-height: 1;
            white-space: nowrap;
            font-size: calc(var(--u) * 8.8);
            font-variant-numeric: tabular-nums;
            contain: layout style;
        }

        .time {
            font-size: 1em;
            font-weight: 100;
            letter-spacing: 0.01em;
        }

        .seconds {
            position: absolute;
            left: calc(100% + 0.22em);
            bottom: 0.14em;
            color: var(--muted);
            font-size: 0.36em;
            font-weight: 200;
            letter-spacing: 0.03em;
        }

        .date {
            margin-top: calc(var(--u) * 0.55);
            color: var(--muted);
            font-size: calc(var(--u) * 1.75);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        html[data-layout="nest-hub"] .clock-display {
            font-size: calc(var(--u) * 7.4);
        }

        .weather-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: calc(var(--u) * 0.45);
            padding: calc(var(--u) * 0.85) calc(var(--u) * 0.95);
        }

        .place {
            width: 100%;
            color: var(--muted);
            font-size: calc(var(--u) * 1.2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current-weather {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: calc(var(--u) * 0.55);
            min-width: 0;
            max-width: 100%;
        }

        .weather-icon {
            flex: 0 0 auto;
            font-size: calc(var(--u) * 4.8);
            line-height: 1;
        }

        .weather-main {
            flex: 0 1 auto;
            min-width: 0;
            text-align: center;
        }

        .temp {
            font-size: calc(var(--u) * 5.4);
            font-weight: 500;
            line-height: 0.95;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums;
        }

        html[data-layout="nest-hub"] .weather-icon {
            font-size: calc(var(--u) * 4.2);
        }

        html[data-layout="nest-hub"] .temp {
            font-size: calc(var(--u) * 4.6);
        }

        .temp-range {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            flex-wrap: wrap;
            gap: calc(var(--u) * 0.35) calc(var(--u) * 0.5);
            padding: calc(var(--u) * 0.35) calc(var(--u) * 0.75);
            border-radius: calc(var(--u) * 0.75);
            background: var(--panel-strong);
            max-width: 100%;
        }

        .temp-high {
            color: var(--temp-high);
            font-size: calc(var(--u) * 1.65);
            font-weight: 500;
            line-height: 1;
        }

        .temp-low {
            color: var(--temp-low);
            font-size: calc(var(--u) * 1.65);
            font-weight: 500;
            line-height: 1;
        }

        .temp-sep {
            color: var(--dim);
            font-size: calc(var(--u) * 1.2);
        }

        .temp-unit {
            font-size: calc(var(--u) * 1.0);
            opacity: 0.85;
        }

        .pop-badge {
            color: var(--pop-color);
            font-size: calc(var(--u) * 1.25);
            font-weight: 500;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .radar-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: calc(var(--u) * 0.45);
        }

        .radar-body {
            flex: 1;
            min-height: 0;
            position: relative;
            border-radius: calc(var(--u) * 0.75);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.35);
        }

        .radar-time {
            position: absolute;
            right: calc(var(--u) * 0.35);
            bottom: calc(var(--u) * 0.28);
            color: rgba(255, 255, 255, 0.78);
            font-size: calc(var(--u) * 0.68);
            line-height: 1;
            pointer-events: none;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.65);
        }

        .hourly-panel,
        .graph-panel,
        .daily-panel,
        .schedule-panel,
        .week-panel {
            padding: calc(var(--u) * 0.55) calc(var(--u) * 0.65);
        }

        .hourly-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .hourly-panel-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: calc(var(--u) * 0.28);
        }

        .hourly-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: calc(var(--u) * 0.28);
            height: calc(var(--u) * 6.4);
            flex-shrink: 0;
        }

        .daily-week-grid {
            flex: 1;
            min-height: calc(var(--u) * 4.2);
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: calc(var(--u) * 0.22);
            align-content: end;
        }


        .daily-week-cell {
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: calc(var(--u) * 0.06);
            padding: calc(var(--u) * 0.12) calc(var(--u) * 0.06);
            border-radius: calc(var(--u) * 0.45);
            background: rgba(255, 255, 255, 0.045);
        }

        .daily-week-cell.today {
            background: rgba(98, 200, 255, 0.1);
        }

        .daily-week-dow {
            color: var(--text);
            font-size: calc(var(--u) * 0.82);
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.04em;
        }

        .daily-week-cell.today .daily-week-dow {
            color: var(--accent);
        }

        .daily-week-icon {
            font-size: calc(var(--u) * 1.15);
            line-height: 1;
        }

        .daily-week-temps {
            display: flex;
            gap: 0.12em;
            font-size: calc(var(--u) * 0.78);
            font-weight: 400;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .daily-week-temp-max {
            color: var(--temp-high);
        }

        .daily-week-temp-min {
            color: var(--temp-low);
        }

        .daily-week-pop {
            color: var(--pop-color);
            font-size: calc(var(--u) * 0.72);
            font-weight: 500;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        html[data-layout="nest-hub"] .hourly-grid {
            height: calc(var(--u) * 6.2);
        }

        .hour-card {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto auto auto;
            place-items: center;
            align-content: center;
            gap: calc(var(--u) * 0.08);
            padding: calc(var(--u) * 0.18) calc(var(--u) * 0.12);
            border-radius: calc(var(--u) * 0.55);
            background: var(--panel-strong);
        }

        .hour-time {
            color: var(--muted);
            font-size: calc(var(--u) * 0.88);
        }

        .hour-icon {
            font-size: calc(var(--u) * 1.65);
            line-height: 1;
        }

        .hour-temp {
            font-size: calc(var(--u) * 1.05);
            font-weight: 500;
        }

        .graph-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .graph-body {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        #radarCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #pressureCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .week-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .week-grid {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .week-grid-layout {
            flex: 1;
            min-height: 0;
            height: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 0fr);
            gap: 0;
            overflow: hidden;
        }

        .week-grid.spotlight-active .week-grid-layout {
            grid-template-columns: minmax(0, 0.88fr) minmax(0, 1.12fr);
            gap: calc(var(--u) * 0.75);
        }

        .week-cal-wrap {
            min-width: 0;
            min-height: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .week-cal {
            flex: 1;
            min-height: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.52s ease-out;
        }

        .week-spotlight {
            display: flex;
            min-width: 0;
            min-height: 0;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            gap: calc(var(--u) * 0.72);
            padding: calc(var(--u) * 1.05) calc(var(--u) * 1.15);
            border-radius: calc(var(--u) * 1.1);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-left-width: calc(var(--u) * 0.42);
            background: linear-gradient(145deg, rgba(98, 200, 255, 0.16), rgba(255, 255, 255, 0.05));
            box-shadow: 0 calc(var(--u) * 0.8) calc(var(--u) * 2.2) rgba(0, 0, 0, 0.28);
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            transform: translateX(105%);
            transition: transform 0.52s ease-out, opacity 0.36s ease-out;
        }

        .week-grid.spotlight-show:not(.spotlight-leaving) .week-spotlight {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .week-grid.spotlight-leaving .week-spotlight {
            opacity: 0;
            transform: translateX(105%);
            pointer-events: none;
        }

        .week-spotlight-label {
            color: var(--accent);
            font-size: calc(var(--u) * 1.42);
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        .week-spotlight-countdown {
            color: var(--warn);
            font-size: calc(var(--u) * 3.6);
            font-weight: 600;
            line-height: 1.05;
            font-variant-numeric: tabular-nums;
        }

        .week-spotlight-time {
            color: var(--muted);
            font-size: calc(var(--u) * 1.65);
            font-variant-numeric: tabular-nums;
        }

        .week-spotlight-meta {
            display: flex;
            flex-direction: column;
            gap: calc(var(--u) * 0.38);
            min-height: 0;
        }

        .week-spotlight-meta-row {
            display: grid;
            grid-template-columns: calc(var(--u) * 3.6) minmax(0, 1fr);
            gap: calc(var(--u) * 0.45);
            align-items: baseline;
            font-size: calc(var(--u) * 1.55);
            line-height: 1.35;
        }

        .week-spotlight-meta-label {
            color: var(--dim);
            font-size: calc(var(--u) * 1.18);
            white-space: nowrap;
        }

        .week-spotlight-meta-value {
            color: var(--text);
            font-variant-numeric: tabular-nums;
            word-break: break-word;
        }

        .week-spotlight-title {
            color: var(--text);
            font-size: calc(var(--u) * 3.5);
            font-weight: 700;
            line-height: 1.16;
            word-break: break-word;
        }

        .week-spotlight-location {
            color: var(--muted);
            font-size: calc(var(--u) * 1.55);
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .week-spotlight-description {
            color: var(--muted);
            font-size: calc(var(--u) * 1.42);
            line-height: 1.45;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            word-break: break-word;
        }

        .week-cal-day-head.spotlight-focus,
        .week-cal-col.spotlight-focus {
            background: rgba(98, 200, 255, 0.08);
        }

        .week-cal-head,
        .week-cal-allday {
            display: grid;
            grid-template-columns: calc(var(--u) * 4.2) repeat(7, minmax(0, 1fr));
            gap: 0;
            min-width: 0;
        }

        .week-cal-head {
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: calc(var(--u) * 0.25);
        }

        .week-cal-corner {
            min-width: 0;
        }

        .week-cal-day-head {
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: calc(var(--u) * 0.1);
            padding: calc(var(--u) * 0.15) calc(var(--u) * 0.2);
            color: var(--muted);
            font-size: calc(var(--u) * 0.92);
            white-space: nowrap;
        }

        .week-cal-day-head.sunday { color: #ff9a8f; }
        .week-cal-day-head.saturday { color: #8fc8ff; }
        .week-cal-day-head.today:not(.sunday):not(.saturday) {
            color: var(--text);
            font-weight: 500;
        }

        .week-cal-day-head.today.sunday,
        .week-cal-day-head.today.saturday {
            font-weight: 500;
        }

        .week-dow {
            line-height: 1;
        }

        .week-date-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: calc(var(--u) * 2);
            height: calc(var(--u) * 2);
            border-radius: 999px;
            font-size: calc(var(--u) * 1.12);
            color: inherit;
            line-height: 1;
        }

        .week-cal-day-head.today .week-date-num {
            background: rgba(98, 200, 255, 0.22);
        }

        .week-cal-day-head.today.sunday .week-date-num {
            background: rgba(255, 154, 143, 0.24);
        }

        .week-cal-day-head.today.saturday .week-date-num {
            background: rgba(143, 200, 255, 0.24);
        }

        .week-cal-allday {
            flex-shrink: 0;
            min-height: calc(var(--u) * 1.6);
            max-height: calc(var(--u) * 7.5);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        .week-cal-allday-label {
            min-width: 0;
        }

        .week-cal-allday-col {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: calc(var(--u) * 0.12);
            padding: calc(var(--u) * 0.12) calc(var(--u) * 0.1);
            overflow: hidden;
        }

        .week-cal-allday-event {
            min-width: 0;
            border-radius: calc(var(--u) * 0.35);
            padding: calc(var(--u) * 0.16) calc(var(--u) * 0.32);
            font-size: calc(var(--u) * 0.8);
            line-height: 1.25;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.12);
            border-left: calc(var(--u) * 0.18) solid var(--accent);
        }

        .week-cal-body {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: calc(var(--u) * 4.2) minmax(0, 1fr);
            overflow: hidden;
        }

        .week-cal-times {
            position: relative;
            min-width: 0;
            height: 100%;
            padding: calc(var(--u) * 0.55) 0;
            box-sizing: border-box;
        }

        .week-cal-time {
            position: absolute;
            left: 0;
            right: calc(var(--u) * 0.15);
            transform: translateY(-50%);
            text-align: right;
            color: var(--dim);
            font-size: calc(var(--u) * 0.68);
            line-height: 1;
        }

        .week-cal-columns {
            position: relative;
            min-width: 0;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            border-left: 1px solid var(--border);
        }

        .week-cal-col {
            position: relative;
            min-width: 0;
            height: 100%;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
        }

        .week-cal-col-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .week-cal-hour-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-50%);
        }

        .week-cal-col.today {
            background: rgba(98, 200, 255, 0.04);
        }

        .week-cal-event {
            position: absolute;
            box-sizing: border-box;
            border-radius: calc(var(--u) * 0.32);
            padding: calc(var(--u) * 0.14) calc(var(--u) * 0.26);
            overflow: hidden;
            color: #fff;
            font-size: calc(var(--u) * 0.74);
            line-height: 1.22;
            border-left: calc(var(--u) * 0.16) solid var(--accent);
            background: rgba(98, 200, 255, 0.28);
            z-index: 1;
        }

        .week-cal-event-time {
            font-size: calc(var(--u) * 0.66);
            opacity: 0.92;
            margin-bottom: calc(var(--u) * 0.05);
            white-space: nowrap;
        }

        .week-cal-event-title {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            word-break: break-word;
        }

        .week-cal-event.short .week-cal-event-time {
            display: none;
        }

        .week-cal-event.short .week-cal-event-title {
            -webkit-line-clamp: 2;
            font-size: calc(var(--u) * 0.68);
        }

        /* Nest Hub では week-panel 自体を非表示のため以下は未使用 */
        html[data-layout="nest-hub"] .week-grid {
            gap: calc(var(--u) * 0.26);
        }

        .daily-list {
            height: calc(100% - 3.2vh);
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75vw;
            min-height: 0;
        }

        .daily-card {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.7vw;
            align-items: center;
            padding: 1vh 0.85vw;
            border-radius: 16px;
            background: var(--panel-strong);
        }

        .daily-icon {
            font-size: clamp(24px, 2.3vw, 44px);
            line-height: 1;
        }

        .daily-date,
        .daily-temp {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .daily-date {
            color: var(--muted);
            font-size: clamp(12px, 0.95vw, 18px);
        }

        .daily-temp {
            margin-top: 0.25vh;
            font-size: clamp(15px, 1.15vw, 22px);
            font-weight: 500;
        }

        .credits {
            align-self: end;
            color: var(--dim);
            font-size: calc(var(--u) * 0.85);
            line-height: 1.45;
            text-align: right;
            padding-top: calc(var(--u) * 0.2);
        }

        .schedule-panel {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .event-list {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: calc(var(--u) * 0.75);
            overflow: hidden;
        }

        .event-card {
            flex: 0 0 auto;
            min-height: 0;
            border-left: calc(var(--u) * 0.38) solid var(--accent);
            border-radius: calc(var(--u) * 0.95);
            background: var(--panel-strong);
            padding: calc(var(--u) * 0.75) calc(var(--u) * 0.85);
        }

        .event-title {
            color: var(--text);
            font-size: calc(var(--u) * 1.45);
            font-weight: 500;
            line-height: 1.32;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .event-time {
            margin-top: calc(var(--u) * 0.32);
            color: var(--warn);
            font-size: calc(var(--u) * 1.12);
            line-height: 1.25;
            white-space: nowrap;
        }

        .event-location {
            margin-top: calc(var(--u) * 0.22);
            color: var(--muted);
            font-size: calc(var(--u) * 1.0);
            line-height: 1.25;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        html[data-layout="nest-hub"] .event-title {
            font-size: calc(var(--u) * 1.32);
        }

        html[data-layout="nest-hub"] .event-list {
            gap: calc(var(--u) * 0.68);
        }

        html[data-layout="nest-hub"] .event-location {
            display: none;
        }

        .empty {
            height: 100%;
            display: grid;
            place-items: center;
            color: var(--dim);
            font-size: calc(var(--u) * 1.45);
            text-align: center;
        }
    </style>
</head>
<body>
    <main id="app" aria-label="Weather receiver">
        <section class="column left">
            <section class="panel clock-panel">
                <div class="clock-display">
                    <div id="time" class="time">--:--</div>
                    <div id="seconds" class="seconds">--</div>
                </div>
                <div id="date" class="date">データ待機中</div>
            </section>

            <section class="panel weather-panel">
                <div id="place" class="place">Weather Info</div>
                <div class="current-weather">
                    <div id="currentIcon" class="weather-icon">--</div>
                    <div class="weather-main">
                        <div id="currentTemp" class="temp">--℃</div>
                    </div>
                </div>
                <div class="temp-range">
                    <span id="tempMax" class="temp-high">--<span class="temp-unit">℃</span></span>
                    <span class="temp-sep">/</span>
                    <span id="tempMin" class="temp-low">--<span class="temp-unit">℃</span></span>
                    <span id="pop" class="pop-badge">降水 --%</span>
                </div>
            </section>

            <section class="panel radar-panel">
                <div class="radar-body">
                    <canvas id="radarCanvas"></canvas>
                    <div id="radarTime" class="radar-time"></div>
                </div>
            </section>
        </section>

        <section class="main-area">
            <div class="top-row">
                <section class="panel hourly-panel">
                    <div class="hourly-panel-body">
                        <div id="hourlyGrid" class="hourly-grid"></div>
                        <div id="dailyWeekGrid" class="daily-week-grid"></div>
                    </div>
                </section>

                <section class="panel graph-panel">
                    <div class="graph-body">
                        <canvas id="pressureCanvas"></canvas>
                    </div>
                </section>
            </div>

            <section class="panel week-panel">
                <div id="weekGrid" class="week-grid"></div>
            </section>

            <section class="panel schedule-panel">
                <div id="eventList" class="event-list"></div>
            </section>

            <div class="credits">
                予報: Open-Meteo.com / 天気概況: 気象庁
            </div>
        </section>
    </main>

    <script>
        const NAMESPACE = 'urn:x-cast:jp.kyogg.weatherinfo';
        const TILE_SIZE = 256;
        let uiState = { calendarEvents: [] };
        let radarDrawToken = 0;
        const radarImageCache = new Map();

        const el = (id) => document.getElementById(id);
        const fmt2 = (n) => String(n).padStart(2, '0');
        const fmtClockTime = (date) => `${date.getHours()}:${fmt2(date.getMinutes())}`;
        let clockPollTimer = null;
        let clockOffsetMs = 0;
        let lastPhoneClockAt = 0;
        const PHONE_CLOCK_STALE_MS = 5000;
        let lastClockSecond = -1;
        let lastClockMinute = '';
        let lastClockDate = '';
        let clockTimeNode = null;
        let clockSecondsNode = null;
        let clockDateNode = null;
        let renderFrame = null;
        let spotlightTimer = null;
        let spotlightAnimTimer = null;
        let lastSpotlightKey = '';
        const SPOTLIGHT_ANIM_MS = 520;
        const PRE_START_MS = 10 * 60 * 1000;
        const SPOTLIGHT_ON_MS = 20 * 1000;
        const SPOTLIGHT_CYCLE_MS = 60 * 1000;
        const round = (value) => Number.isFinite(Number(value)) ? Math.round(Number(value)) : null;

        function findSpotlightEvent(events, nowMs) {
            const timed = (Array.isArray(events) ? events : [])
                .filter((event) => !event.allDay)
                .map((event) => ({
                    event,
                    start: Number(event.start),
                    end: Number(event.end),
                }))
                .filter(({ start, end }) => Number.isFinite(start) && Number.isFinite(end) && end > nowMs)
                .sort((a, b) => a.start - b.start);

            return timed.find(({ start }) => {
                return nowMs >= start - PRE_START_MS && nowMs < start;
            }) || null;
        }

        function isSpotlightPhase(nowMs, eventStartMs) {
            const windowStart = eventStartMs - PRE_START_MS;
            if (nowMs < windowStart || nowMs >= eventStartMs) return false;
            const elapsed = nowMs - windowStart;
            return (elapsed % SPOTLIGHT_CYCLE_MS) < SPOTLIGHT_ON_MS;
        }

        function formatSpotlightCountdown(nowMs, startMs) {
            const minutes = Math.max(0, Math.ceil((startMs - nowMs) / 60000));
            if (minutes <= 0) return 'まもなく開始';
            return `あと ${minutes}分`;
        }

        function buildSpotlightMetaHtml(event, start, end) {
            const rows = [];
            const startLabel = formatClockFromMs(start);
            const endLabel = formatClockFromMs(end);

            if (startLabel) rows.push({ label: '開始', value: startLabel });
            if (endLabel) rows.push({ label: '終了', value: endLabel });

            const durationMin = Math.max(0, Math.round((end - start) / 60000));
            if (durationMin > 0) {
                rows.push({ label: '所要', value: `${durationMin}分` });
            }

            const location = cleanText(event.location, '');
            if (location) rows.push({ label: '場所', value: location });

            const description = cleanText(event.description, '');
            if (description) rows.push({ label: '詳細', value: description });

            if (rows.length === 0) return '';

            return `
                <div class="week-spotlight-meta">
                    ${rows.map(({ label, value }) => `
                        <div class="week-spotlight-meta-row">
                            <span class="week-spotlight-meta-label">${escapeHtml(label)}</span>
                            <span class="week-spotlight-meta-value">${escapeHtml(value)}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function buildSpotlightPanelHtml(spotlight, nowMs) {
            const { event, start, end } = spotlight;
            const title = escapeHtml(cleanText(event.title, '無題'));
            return `
                <div class="week-spotlight-label">まもなく開始</div>
                <div class="week-spotlight-countdown">${escapeHtml(formatSpotlightCountdown(nowMs, start))}</div>
                <div class="week-spotlight-title">${title}</div>
                ${buildSpotlightMetaHtml(event, start, end)}
            `;
        }

        function renderSpotlightPanel(target, spotlight, nowMs, html) {
            if (!target || !spotlight) {
                if (target) target.innerHTML = '';
                return;
            }

            const { event } = spotlight;
            const color = colorToCss(event.color);
            target.style.borderLeftColor = color;
            target.style.background = `linear-gradient(145deg, ${color}33, rgba(255, 255, 255, 0.05))`;
            target.innerHTML = html || buildSpotlightPanelHtml(spotlight, nowMs);
        }

        function getWeekDayIndex(dateMs) {
            const weekStart = startOfWeekSunday(new Date()).getTime();
            const dayStart = startOfDay(new Date(dateMs)).getTime();
            return Math.round((dayStart - weekStart) / 86400000);
        }

        function syncSpotlightCalendarView(grid, dayIndex, active) {
            const wrap = grid?.querySelector('.week-cal-wrap');
            const cal = grid?.querySelector('.week-cal');
            if (!wrap || !cal) return;

            const showing = active
                && grid.classList.contains('spotlight-show')
                && !grid.classList.contains('spotlight-leaving');

            if (!showing || dayIndex < 0) {
                wrap.style.removeProperty('clip-path');
                cal.style.transform = '';
                return;
            }

            const times = grid.querySelector('.week-cal-times');
            const day0Head = grid.querySelector('.week-cal-day-head[data-week-day="0"]');
            const day1Head = grid.querySelector('.week-cal-day-head[data-week-day="1"]');
            const day0Col = grid.querySelector('.week-cal-col[data-week-day="0"]');
            const focusCol = grid.querySelector(`.week-cal-col[data-week-day="${dayIndex}"]`);
            if (!times || !day0Head || !day1Head || !day0Col || !focusCol) return;

            const dayColW = Math.max(1, day1Head.offsetLeft - day0Head.offsetLeft);
            const wrapRect = wrap.getBoundingClientRect();
            const clipLeft = Math.max(0, Math.round(times.getBoundingClientRect().left - wrapRect.left));
            const clipRight = Math.max(0, Math.round(wrapRect.width - clipLeft - dayColW));
            wrap.style.clipPath = `inset(0 ${clipRight}px 0 ${clipLeft}px)`;

            const shift = day0Col.offsetLeft - focusCol.offsetLeft;
            cal.style.transform = `translateX(${shift}px)`;
        }

        function applySpotlightDayFocus(grid, active, dayIndex) {
            if (!grid) return;
            const highlight = active
                && grid.classList.contains('spotlight-show')
                && !grid.classList.contains('spotlight-leaving');

            grid.querySelectorAll('[data-week-day]').forEach((node) => {
                const index = Number(node.dataset.weekDay);
                node.classList.toggle('spotlight-focus', highlight && index === dayIndex);
            });
        }

        function setSpotlightVisible(grid, visible) {
            if (!grid) return;
            const isLayoutActive = grid.classList.contains('spotlight-active');
            const isShowing = grid.classList.contains('spotlight-show');
            const isLeaving = grid.classList.contains('spotlight-leaving');

            if (visible) {
                clearTimeout(spotlightAnimTimer);
                grid.classList.remove('spotlight-leaving');

                if (!isLayoutActive) {
                    grid.classList.add('spotlight-active');
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            grid.classList.add('spotlight-show');
                            updateCalendarSpotlight();
                        });
                    });
                    return;
                }

                grid.classList.add('spotlight-show');
                return;
            }

            if (!visible && isLeaving) return;

            if (!visible && (isShowing || isLayoutActive)) {
                clearTimeout(spotlightAnimTimer);
                grid.classList.add('spotlight-leaving');
                grid.classList.remove('spotlight-show');
                syncSpotlightCalendarView(grid, -1, false);
                applySpotlightDayFocus(grid, false, -1);

                spotlightAnimTimer = setTimeout(() => {
                    grid.classList.remove('spotlight-active', 'spotlight-leaving');
                    const panel = el('weekSpotlight');
                    if (panel) panel.innerHTML = '';
                }, SPOTLIGHT_ANIM_MS);
                return;
            }

            if (!visible) {
                grid.classList.remove('spotlight-show', 'spotlight-active', 'spotlight-leaving');
                syncSpotlightCalendarView(grid, -1, false);
            }
        }

        function getSpotlightPollDelay(nowMs) {
            const events = Array.isArray(uiState.calendarEvents) ? uiState.calendarEvents : [];
            const spotlight = findSpotlightEvent(events, nowMs);
            if (!spotlight) return 5000;
            if (isSpotlightPhase(nowMs, spotlight.start)) return 1000;
            return 3000;
        }

        function updateCalendarSpotlight() {
            const grid = el('weekGrid');
            const panel = el('weekSpotlight');
            if (!grid) return;

            const nowMs = Date.now();
            const events = Array.isArray(uiState.calendarEvents) ? uiState.calendarEvents : [];
            const spotlight = findSpotlightEvent(events, nowMs);
            const active = spotlight ? isSpotlightPhase(nowMs, spotlight.start) : false;
            const dayIndex = spotlight ? getWeekDayIndex(spotlight.start) : -1;
            const nextKey = active && spotlight
                ? `${spotlight.event.id}:${spotlight.start}:on`
                : spotlight
                    ? `${spotlight.event.id}:${spotlight.start}:off`
                    : 'none';

            setSpotlightVisible(grid, active);
            syncSpotlightCalendarView(grid, dayIndex, active);
            if (active) {
                applySpotlightDayFocus(grid, true, dayIndex);
            } else if (!grid.classList.contains('spotlight-leaving')) {
                applySpotlightDayFocus(grid, false, -1);
            }
            if (active && spotlight) {
                const nextPanel = buildSpotlightPanelHtml(spotlight, nowMs);
                if (panel && panel.innerHTML !== nextPanel) {
                    renderSpotlightPanel(panel, spotlight, nowMs, nextPanel);
                }
            }

            if (nextKey !== lastSpotlightKey) {
                lastSpotlightKey = nextKey;
            }
        }

        function startSpotlightLoop() {
            if (spotlightTimer) {
                clearTimeout(spotlightTimer);
                spotlightTimer = null;
            }

            const loop = () => {
                updateCalendarSpotlight();
                spotlightTimer = setTimeout(loop, getSpotlightPollDelay(Date.now()));
            };

            loop();
        }

        function stopSpotlightLoop() {
            if (spotlightTimer) {
                clearTimeout(spotlightTimer);
                spotlightTimer = null;
            }
        }

        function detectLayout() {
            // 解像度判定でリスト形式へ落ちないよう、常に週間カレンダー(FHD)レイアウトを使う
            document.documentElement.dataset.layout = 'fhd';
            return 'fhd';
        }

        function getMaxEvents() {
            return 8;
        }

        function getGraphPadding(width) {
            const layout = document.documentElement.dataset.layout || 'fhd';
            if (layout === 'nest-hub') {
                return { left: 48, right: 18, top: 12, bottom: 24 };
            }
            return {
                left: Math.max(52, width * 0.08),
                right: Math.max(24, width * 0.03),
                top: 16,
                bottom: 30
            };
        }

        function setText(id, value) {
            const node = el(id);
            if (node) node.textContent = value;
        }

        function setHtml(id, value) {
            const node = el(id);
            if (node) node.innerHTML = value;
        }

        function latLonToPixel(lat, lon, zoom) {
            const scale = TILE_SIZE * Math.pow(2, zoom);
            const x = (lon + 180) / 360 * scale;
            const sinLat = Math.sin(lat * Math.PI / 180);
            const y = (0.5 - Math.log((1 + sinLat) / (1 - sinLat)) / (4 * Math.PI)) * scale;
            return { x, y };
        }

        function loadImage(url) {
            if (radarImageCache.has(url)) {
                const cached = radarImageCache.get(url);
                return cached instanceof Promise ? cached : Promise.resolve(cached);
            }
            const pending = new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    radarImageCache.set(url, img);
                    resolve(img);
                };
                img.onerror = () => {
                    radarImageCache.set(url, null);
                    resolve(null);
                };
                img.src = url;
            });
            radarImageCache.set(url, pending);
            return pending;
        }

        function formatRadarTime(validtime) {
            if (!validtime || validtime.length < 12) return '';
            const y = Number(validtime.slice(0, 4));
            const mo = Number(validtime.slice(4, 6)) - 1;
            const d = Number(validtime.slice(6, 8));
            const h = Number(validtime.slice(8, 10));
            const mi = Number(validtime.slice(10, 12));
            const date = new Date(Date.UTC(y, mo, d, h, mi, 0));
            if (Number.isNaN(date.getTime())) return '';
            return `実況 ${date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Tokyo' })}`;
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function cleanText(value, fallback = '') {
            return String(value ?? fallback)
                .replace(/\\,/g, ',')
                .replace(/\\;/g, ';')
                .replace(/\\n/g, ' ')
                .replace(/\\/g, '')
                .trim();
        }

        function weatherEmoji(condition, isNight = false) {
            const main = String(condition || '').split('_')[0];
            if (main === 'Clear') return isNight ? '🌙' : '☀️';
            if (main === 'Clouds') return '☁️';
            if (main === 'Rain') return '☔';
            if (main === 'Snow') return '❄️';
            if (main === 'Thunder') return '⚡';
            if (main === 'Fog') return '🌫️';
            return '☁️';
        }

        function colorToCss(color) {
            if (typeof color === 'string' && color.trim().startsWith('#')) return color.trim();
            if (typeof color !== 'number') return '#62c8ff';
            const rgb = (color >>> 0) & 0x00ffffff;
            return '#' + rgb.toString(16).padStart(6, '0');
        }

        function formatDateFromMillis(ms) {
            const date = new Date(ms);
            if (Number.isNaN(date.getTime())) return '';
            return date.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', weekday: 'short' });
        }

        function formatEventTime(event) {
            const start = new Date(event.start);
            const end = new Date(event.end);
            if (Number.isNaN(start.getTime())) return '';
            const day = start.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', weekday: 'short' });
            if (event.allDay) return `${day} 終日`;
            const startTime = `${fmt2(start.getHours())}:${fmt2(start.getMinutes())}`;
            const endTime = Number.isNaN(end.getTime()) ? '' : ` - ${fmt2(end.getHours())}:${fmt2(end.getMinutes())}`;
            return `${day} ${startTime}${endTime}`;
        }

        function startOfDay(date) {
            return new Date(date.getFullYear(), date.getMonth(), date.getDate());
        }

        function startOfWeekSunday(date) {
            const day = startOfDay(date);
            day.setDate(day.getDate() - day.getDay());
            return day;
        }

        function sameDay(a, b) {
            return a.getFullYear() === b.getFullYear()
                && a.getMonth() === b.getMonth()
                && a.getDate() === b.getDate();
        }

        function formatEventTimeShort(event) {
            if (event.allDay) return '終日';
            const start = new Date(event.start);
            if (Number.isNaN(start.getTime())) return '';
            return `${fmt2(start.getHours())}:${fmt2(start.getMinutes())}`;
        }

        function getHourlyWindow(weather) {
            const hourly = Array.isArray(weather?.hourlyForecast) ? weather.hourlyForecast : [];
            if (hourly.length <= 6) return hourly;

            const currentHour = new Date().getHours();
            const start = Math.max(0, Math.min(hourly.length - 6, currentHour));
            return hourly.slice(start, start + 6);
        }

        function getSyncedNow() {
            if (Date.now() - lastPhoneClockAt < PHONE_CLOCK_STALE_MS) {
                return new Date(Date.now() + clockOffsetMs);
            }
            return new Date();
        }

        function applyPhoneClockSync(epochMs) {
            const remote = Number(epochMs);
            if (!Number.isFinite(remote)) return;
            clockOffsetMs = remote - Date.now();
            lastPhoneClockAt = Date.now();
            renderClock(getSyncedNow());
        }

        function getClockNodes() {
            if (!clockTimeNode) clockTimeNode = el('time');
            if (!clockSecondsNode) clockSecondsNode = el('seconds');
            if (!clockDateNode) clockDateNode = el('date');
            return { clockTimeNode, clockSecondsNode, clockDateNode };
        }

        function stopLocalClock() {
            if (clockPollTimer) {
                clearTimeout(clockPollTimer);
                clockPollTimer = null;
            }
        }

        function renderClock() {
            const now = getSyncedNow();
            const sec = now.getSeconds();
            const timeStr = fmtClockTime(now);
            const secStr = fmt2(sec);
            const dateStr = now.toLocaleDateString('ja-JP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'short',
            });

            if (sec === lastClockSecond && timeStr === lastClockMinute && dateStr === lastClockDate) {
                return;
            }

            const { clockTimeNode, clockSecondsNode, clockDateNode } = getClockNodes();
            if (clockSecondsNode) {
                clockSecondsNode.textContent = secStr;
            }
            if (timeStr !== lastClockMinute && clockTimeNode) {
                clockTimeNode.textContent = timeStr;
                lastClockMinute = timeStr;
            }
            if (dateStr !== lastClockDate && clockDateNode) {
                clockDateNode.textContent = dateStr;
                lastClockDate = dateStr;
            }
            lastClockSecond = sec;
        }

        function ingestCastPayload(raw) {
            const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
            if (data && data._clock === true) {
                applyPhoneClockSync(data.t);
                return true;
            }
            uiState = data || { calendarEvents: [] };
            scheduleRender();
            return false;
        }

        function startLocalClock() {
            stopLocalClock();
            lastClockSecond = -1;
            renderClock();

            const poll = () => {
                renderClock();
                clockPollTimer = setTimeout(poll, 125);
            };
            poll();
        }

        function renderWeather() {
            const weather = uiState.weather;
            setText('place', uiState.detectedAreaName || 'Weather Info');
            if (!weather) {
                setText('currentIcon', '--');
                setText('currentTemp', '--℃');
                setHtml('tempMax', `--<span class="temp-unit">℃</span>`);
                setHtml('tempMin', `--<span class="temp-unit">℃</span>`);
                setText('pop', '降水 --%');
                setText('radarTime', '');
                return;
            }

            const temp = round(weather.temp);
            const tempMax = round(weather.tempMax);
            const tempMin = round(weather.tempMin);
            const pop = round(weather.pop);

            setText('currentIcon', weatherEmoji(weather.condition));
            setText('currentTemp', temp === null ? '--℃' : `${temp}℃`);
            setHtml('tempMax', `${tempMax === null ? '--' : tempMax}<span class="temp-unit">℃</span>`);
            setHtml('tempMin', `${tempMin === null ? '--' : tempMin}<span class="temp-unit">℃</span>`);
            setText('pop', pop === null ? '降水 --%' : `降水 ${pop}%`);
            setText('radarTime', formatRadarTime(weather.nowcastMeta?.validtime));
        }

        function renderHourly() {
            const grid = el('hourlyGrid');
            const hours = getHourlyWindow(uiState.weather);
            if (!grid) return;
            if (hours.length === 0) {
                grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">時間別予報を待っています</div>';
                return;
            }
            grid.innerHTML = hours.map((hour) => {
                const temp = round(hour.temp);
                return `
                    <div class="hour-card">
                        <div class="hour-time">${escapeHtml(hour.time || '')}</div>
                        <div class="hour-icon">${weatherEmoji(hour.condition, hour.isNight)}</div>
                        <div class="hour-temp">${temp === null ? '--' : temp}℃</div>
                    </div>
                `;
            }).join('');
        }

        function findDailyForDay(dailyList, dayDate) {
            const dayStart = startOfDay(dayDate).getTime();
            return dailyList.find((item) => {
                const itemDay = startOfDay(new Date(Number(item.date))).getTime();
                return itemDay === dayStart;
            });
        }

        function renderDailyWeek() {
            const grid = el('dailyWeekGrid');
            if (!grid) return;

            const daily = Array.isArray(uiState.weather?.dailyForecast) ? uiState.weather.dailyForecast : [];
            const weekStart = startOfWeekSunday(new Date());
            const today = new Date();
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];

            if (daily.length === 0) {
                grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">週間天気を待っています</div>';
                return;
            }

            grid.innerHTML = Array.from({ length: 7 }, (_, index) => {
                const day = new Date(weekStart);
                day.setDate(weekStart.getDate() + index);
                const forecast = findDailyForDay(daily, day);
                const classes = ['daily-week-cell', sameDay(day, today) ? 'today' : ''].filter(Boolean).join(' ');

                if (!forecast) {
                    return `
                        <div class="${classes}">
                            <div class="daily-week-dow">${dayNames[index]}</div>
                            <div class="daily-week-icon">--</div>
                            <div class="daily-week-temps"><span>--</span><span>--</span></div>
                        </div>
                    `;
                }

                const tempMax = round(forecast.tempMax);
                const tempMin = round(forecast.tempMin);
                const pop = round(forecast.pop);
                return `
                    <div class="${classes}">
                        <div class="daily-week-dow">${dayNames[index]}</div>
                        <div class="daily-week-icon">${weatherEmoji(forecast.condition)}</div>
                        <div class="daily-week-temps">
                            <span class="daily-week-temp-max">${tempMax === null ? '--' : tempMax}°</span>
                            <span class="daily-week-temp-min">${tempMin === null ? '--' : tempMin}°</span>
                        </div>
                        <div class="daily-week-pop">${pop === null ? '--' : pop}%</div>
                    </div>
                `;
            }).join('');
        }

        function renderEvents() {
            const list = el('eventList');
            if (!list) return;
            const events = Array.isArray(uiState.calendarEvents) ? uiState.calendarEvents : [];
            const now = Date.now();
            const upcoming = events
                .filter((event) => Number(event.end) >= now)
                .sort((a, b) => Number(a.start) - Number(b.start))
                .slice(0, getMaxEvents());

            if (upcoming.length === 0) {
                list.innerHTML = '<div class="empty">予定はありません</div>';
                return;
            }

            list.innerHTML = upcoming.map((event) => {
                const title = escapeHtml(cleanText(event.title, '無題'));
                const location = cleanText(event.location, '');
                return `
                    <article class="event-card" style="border-left-color:${colorToCss(event.color)}">
                        <div class="event-title">${title}</div>
                        <div class="event-time">${escapeHtml(formatEventTime(event))}</div>
                        ${location ? `<div class="event-location">${escapeHtml(location)}</div>` : ''}
                    </article>
                `;
            }).join('');
        }

        const CAL_START_MINUTES = 8 * 60 + 30;
        const CAL_END_MINUTES = 22 * 60 + 30;
        const CAL_DURATION_MINUTES = CAL_END_MINUTES - CAL_START_MINUTES;
        const CAL_SEGMENT_COUNT = 14;

        function msFromDayMinutes(dayStartMs, minutes) {
            return dayStartMs + minutes * 60000;
        }

        function calendarMinuteToPercent(minutesFromMidnight) {
            return ((minutesFromMidnight - CAL_START_MINUTES) / CAL_DURATION_MINUTES) * 100;
        }

        function buildCalendarTimeLabels() {
            return Array.from({ length: 14 }, (_, index) => {
                const hour = 9 + index;
                const pct = calendarMinuteToPercent(hour * 60);
                return `<div class="week-cal-time" style="top:${pct}%">${hour}:00</div>`;
            }).join('');
        }

        function buildCalendarHourLines() {
            return Array.from({ length: 14 }, (_, index) => {
                const pct = calendarMinuteToPercent((9 + index) * 60);
                return `<div class="week-cal-hour-line" style="top:${pct}%"></div>`;
            }).join('');
        }

        function eventOverlapsDay(event, dayStartMs, dayEndMs) {
            return Number(event.end) > dayStartMs && Number(event.start) < dayEndMs;
        }

        function formatClockFromMs(ms) {
            const date = new Date(ms);
            if (Number.isNaN(date.getTime())) return '';
            return `${fmt2(date.getHours())}:${fmt2(date.getMinutes())}`;
        }

        function formatEventBlockTime(startMs, endMs) {
            return `${formatClockFromMs(startMs)} - ${formatClockFromMs(endMs)}`;
        }

        function clipEventToDayRange(event, dayStartMs) {
            const rangeStart = msFromDayMinutes(dayStartMs, CAL_START_MINUTES);
            const rangeEnd = msFromDayMinutes(dayStartMs, CAL_END_MINUTES);
            const clipStart = Math.max(Number(event.start), rangeStart);
            const clipEnd = Math.min(Number(event.end), rangeEnd);
            if (clipEnd <= clipStart) return null;
            return { event, clipStart, clipEnd, rangeStart };
        }

        function assignEventColumns(blocks) {
            if (!blocks.length) return [];
            const sorted = [...blocks].sort((a, b) => a.clipStart - b.clipStart || a.clipEnd - b.clipEnd);
            const placed = sorted.map((block) => ({ ...block, col: 0, colCount: 1 }));

            let index = 0;
            while (index < placed.length) {
                let groupEnd = placed[index].clipEnd;
                let next = index + 1;
                while (next < placed.length && placed[next].clipStart < groupEnd) {
                    groupEnd = Math.max(groupEnd, placed[next].clipEnd);
                    next += 1;
                }

                const group = placed.slice(index, next);
                const colEnds = [];
                group.forEach((block) => {
                    let col = 0;
                    while (colEnds[col] && colEnds[col] > block.clipStart) col += 1;
                    colEnds[col] = block.clipEnd;
                    block.col = col;
                });
                const colCount = Math.max(1, colEnds.length);
                group.forEach((block) => { block.colCount = colCount; });
                index = next;
            }

            return placed;
        }

        function renderWeekCalendar() {
            const grid = el('weekGrid');
            const events = Array.isArray(uiState.calendarEvents) ? uiState.calendarEvents : [];
            if (!grid) return;

            const weekStart = startOfWeekSunday(new Date());
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            const today = new Date();
            const days = Array.from({ length: 7 }, (_, index) => {
                const day = new Date(weekStart);
                day.setDate(weekStart.getDate() + index);
                return day;
            });

            const headHtml = days.map((day, index) => {
                const classes = [
                    'week-cal-day-head',
                    index === 0 ? 'sunday' : '',
                    index === 6 ? 'saturday' : '',
                    sameDay(day, today) ? 'today' : '',
                ].filter(Boolean).join(' ');
                return `
                    <div class="${classes}" data-week-day="${index}">
                        <span class="week-dow">${dayNames[index]}</span>
                        <span class="week-date-num">${day.getDate()}</span>
                    </div>
                `;
            }).join('');

            const alldayHtml = days.map((day, index) => {
                const dayStart = startOfDay(day).getTime();
                const dayEnd = dayStart + 86400000;
                const alldayEvents = events
                    .filter((event) => event.allDay && eventOverlapsDay(event, dayStart, dayEnd))
                    .sort((a, b) => Number(a.start) - Number(b.start) || cleanText(a.title).localeCompare(cleanText(b.title), 'ja'));

                return `
                    <div class="week-cal-allday-col${sameDay(day, today) ? ' today-col' : ''}" data-week-day="${index}">
                        ${alldayEvents.map((event) => `
                            <div class="week-cal-allday-event" style="border-left-color:${colorToCss(event.color)};background:${colorToCss(event.color)}33">
                                ${escapeHtml(cleanText(event.title, '無題'))}
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');

            const timeLabels = buildCalendarTimeLabels();
            const hourLines = buildCalendarHourLines();

            const columnsHtml = days.map((day, index) => {
                const dayStart = startOfDay(day).getTime();
                const dayEnd = dayStart + 86400000;
                const timedBlocks = events
                    .filter((event) => !event.allDay && eventOverlapsDay(event, dayStart, dayEnd))
                    .map((event) => clipEventToDayRange(event, dayStart))
                    .filter(Boolean);
                const laidOut = assignEventColumns(timedBlocks);
                const totalMs = CAL_DURATION_MINUTES * 60000;

                const eventsHtml = laidOut.map(({ event, clipStart, clipEnd, col, colCount, rangeStart }) => {
                    const top = ((clipStart - rangeStart) / totalMs) * 100;
                    const height = Math.max(((clipEnd - clipStart) / totalMs) * 100, 100 / CAL_SEGMENT_COUNT * 0.4);
                    const width = 100 / colCount;
                    const left = width * col;
                    const isShort = (clipEnd - clipStart) < 45 * 60000;
                    const color = colorToCss(event.color);
                    return `
                        <article
                            class="week-cal-event${isShort ? ' short' : ''}"
                            style="top:${top}%;height:${height}%;left:calc(${left}% + 1px);width:calc(${width}% - 2px);border-left-color:${color};background:${color}44"
                        >
                            <div class="week-cal-event-time">${escapeHtml(formatEventBlockTime(clipStart, clipEnd))}</div>
                            <div class="week-cal-event-title">${escapeHtml(cleanText(event.title, '無題'))}</div>
                        </article>
                    `;
                }).join('');

                const classes = ['week-cal-col', sameDay(day, today) ? 'today' : ''].filter(Boolean).join(' ');
                return `
                    <div class="${classes}" data-week-day="${index}">
                        <div class="week-cal-col-lines">${hourLines}</div>
                        ${eventsHtml}
                    </div>
                `;
            }).join('');

            grid.innerHTML = `
                <div class="week-grid-layout">
                    <div class="week-cal-wrap">
                        <div class="week-cal">
                            <div class="week-cal-head">
                                <div class="week-cal-corner"></div>
                                ${headHtml}
                            </div>
                            <div class="week-cal-allday">
                                <div class="week-cal-allday-label"></div>
                                ${alldayHtml}
                            </div>
                            <div class="week-cal-body">
                                <div class="week-cal-times">${timeLabels}</div>
                                <div class="week-cal-columns">${columnsHtml}</div>
                            </div>
                        </div>
                    </div>
                    <aside id="weekSpotlight" class="week-spotlight" aria-live="polite"></aside>
                </div>
            `;
            updateCalendarSpotlight();
        }

        function drawRadar() {
            const canvas = el('radarCanvas');
            const wrap = canvas?.parentElement;
            if (!canvas || !wrap) return Promise.resolve();

            const drawToken = ++radarDrawToken;
            const width = Math.max(1, Math.floor(wrap.clientWidth));
            const height = Math.max(1, Math.floor(wrap.clientHeight));

            // タイル256pxを1:1で描く（DPR拡大による引き伸ばしを避ける）
            canvas.width = width;
            canvas.height = height;
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;

            const ctx = canvas.getContext('2d');
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.imageSmoothingEnabled = false;
            ctx.fillStyle = '#1a1f28';
            ctx.fillRect(0, 0, width, height);

            const lat = Number(uiState.manualLat);
            const lon = Number(uiState.manualLon);
            const meta = uiState.weather?.nowcastMeta;
            const zoom = 10;

            if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
                ctx.fillStyle = '#687080';
                ctx.font = `${Math.max(12, width * 0.04)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('位置情報を待っています', width / 2, height / 2);
                return Promise.resolve();
            }

            const center = latLonToPixel(lat, lon, zoom);
            const topLeftX = center.x - width / 2;
            const topLeftY = center.y - height / 2;
            const startTx = Math.floor(topLeftX / TILE_SIZE);
            const startTy = Math.floor(topLeftY / TILE_SIZE);
            const endTx = Math.floor((topLeftX + width) / TILE_SIZE);
            const endTy = Math.floor((topLeftY + height) / TILE_SIZE);
            const gsiBase = 'https://cyberjapandata.gsi.go.jp/xyz/pale/';
            const jmaBase = meta
                ? `https://www.jma.go.jp/bosai/jmatile/data/nowc/${meta.basetime}/none/${meta.validtime}/surf/hrpns/`
                : null;

            const jobs = [];
            for (let ty = startTy; ty <= endTy; ty++) {
                for (let tx = startTx; tx <= endTx; tx++) {
                    jobs.push({
                        tx,
                        ty,
                        drawX: Math.round(tx * TILE_SIZE - topLeftX),
                        drawY: Math.round(ty * TILE_SIZE - topLeftY),
                    });
                }
            }

            const urls = [];
            jobs.forEach(({ tx, ty }) => {
                urls.push(`${gsiBase}${zoom}/${tx}/${ty}.png`);
                if (jmaBase) urls.push(`${jmaBase}${zoom}/${tx}/${ty}.png`);
            });

            return Promise.all(urls.map(loadImage)).then(() => {
                if (drawToken !== radarDrawToken) return;

                jobs.forEach(({ tx, ty, drawX, drawY }) => {
                    const gsiImg = radarImageCache.get(`${gsiBase}${zoom}/${tx}/${ty}.png`);
                    if (gsiImg && !(gsiImg instanceof Promise)) {
                        ctx.drawImage(gsiImg, 0, 0, TILE_SIZE, TILE_SIZE, drawX, drawY, TILE_SIZE, TILE_SIZE);
                    }
                });

                if (jmaBase) {
                    ctx.save();
                    ctx.globalAlpha = 0.55;
                    jobs.forEach(({ tx, ty, drawX, drawY }) => {
                        const jmaImg = radarImageCache.get(`${jmaBase}${zoom}/${tx}/${ty}.png`);
                        if (jmaImg && !(jmaImg instanceof Promise)) {
                            ctx.drawImage(jmaImg, 0, 0, TILE_SIZE, TILE_SIZE, drawX, drawY, TILE_SIZE, TILE_SIZE);
                        }
                    });
                    ctx.restore();
                }

                const pinX = width / 2;
                const pinY = height / 2;
                ctx.fillStyle = '#4caf50';
                ctx.beginPath();
                ctx.arc(pinX, pinY - 7, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(pinX - 7, pinY - 2);
                ctx.lineTo(pinX, pinY + 10);
                ctx.lineTo(pinX + 7, pinY - 2);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(pinX, pinY - 7, 2.5, 0, Math.PI * 2);
                ctx.fill();

                if (!jmaBase) {
                    ctx.fillStyle = 'rgba(255,255,255,0.75)';
                    ctx.font = `${Math.max(11, width * 0.028)}px sans-serif`;
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('レーダー待機中', width - 8, height - 8);
                }
            });
        }

        function drawPressure() {
            const canvas = el('pressureCanvas');
            const wrap = canvas?.parentElement;
            if (!canvas || !wrap) return;

            const ratio = window.devicePixelRatio || 1;
            const width = Math.max(1, wrap.clientWidth);
            const height = Math.max(1, wrap.clientHeight);
            canvas.width = Math.floor(width * ratio);
            canvas.height = Math.floor(height * ratio);
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;

            const ctx = canvas.getContext('2d');
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            ctx.clearRect(0, 0, width, height);

            const data = getHourlyWindow(uiState.weather)
                .map((hour) => ({ label: hour.time || '', value: Number(hour.pressure) }))
                .filter((point) => Number.isFinite(point.value));

            ctx.fillStyle = '#687080';
            const layout = document.documentElement.dataset.layout || 'fhd';
            const fontSize = layout === 'nest-hub'
                ? Math.max(10, width * 0.028)
                : Math.max(12, width * 0.032);
            ctx.font = `${fontSize}px sans-serif`;

            if (data.length < 2) {
                ctx.textAlign = 'center';
                ctx.fillText('気圧データを待っています', width / 2, height / 2);
                return;
            }

            const pad = getGraphPadding(width);
            const plotW = width - pad.left - pad.right;
            const plotH = height - pad.top - pad.bottom;
            const values = data.map((point) => point.value);
            const min = Math.floor(Math.min(...values) - 1);
            const max = Math.ceil(Math.max(...values) + 1);
            const range = Math.max(1, max - min);
            const x = (i) => pad.left + (plotW * i) / (data.length - 1);
            const y = (value) => pad.top + plotH - ((value - min) / range) * plotH;

            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#687080';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let i = 0; i <= 3; i++) {
                const yy = pad.top + (plotH * i) / 3;
                const value = Math.round(max - (range * i) / 3);
                ctx.beginPath();
                ctx.moveTo(pad.left, yy);
                ctx.lineTo(width - pad.right, yy);
                ctx.stroke();
                ctx.fillText(String(value), pad.left - 8, yy);
            }

            ctx.beginPath();
            data.forEach((point, i) => {
                const px = x(i);
                const py = y(point.value);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            });
            ctx.strokeStyle = '#62c8ff';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            ctx.fillStyle = '#62c8ff';
            data.forEach((point, i) => {
                ctx.beginPath();
                ctx.arc(x(i), y(point.value), 3.4, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = '#aab2c0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            data.forEach((point, i) => {
                if (i === 0 || i === data.length - 1 || i % 2 === 1) {
                    ctx.fillText(point.label, x(i), height - pad.bottom + 9);
                }
            });
        }

        function scheduleRender() {
            if (renderFrame !== null) return;
            renderFrame = requestAnimationFrame(() => {
                renderFrame = null;
                render();
            });
        }

        function render() {
            renderWeather();
            renderHourly();
            renderDailyWeek();
            renderWeekCalendar();
            renderEvents();
            setTimeout(() => {
                drawRadar();
                drawPressure();
            }, 0);
        }

        window.__setWeatherInfoState = (nextState) => {
            uiState = nextState || { calendarEvents: [] };
            scheduleRender();
        };

        function startCastReceiver() {
            if (!window.cast || !cast.framework) {
                console.warn('Cast framework is not available. Running in browser preview mode.');
                return;
            }

            const context = cast.framework.CastReceiverContext.getInstance();
            context.addCustomMessageListener(NAMESPACE, (event) => {
                try {
                    ingestCastPayload(event.data);
                } catch (error) {
                    console.error('Failed to parse cast message', error);
                }
            });

            const options = new cast.framework.CastReceiverOptions();
            // メディア非再生のカスタム UI でもアイドル切断しない
            options.disableIdleTimeout = true;
            options.maxInactivity = 3600;
            context.start(options);
        }

        function refreshLayoutViews() {
            detectLayout();
            drawRadar();
            drawPressure();
            renderDailyWeek();
            renderWeekCalendar();
            renderEvents();
        }

        window.addEventListener('resize', refreshLayoutViews);
        startLocalClock();
        startSpotlightLoop();
        detectLayout();
        startCastReceiver();
        render();
        setTimeout(refreshLayoutViews, 400);
        setTimeout(refreshLayoutViews, 1500);
    </script>
</body>
