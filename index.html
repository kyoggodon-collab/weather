<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard for Nest Hub</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: black; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #app { display: flex; height: 100vh; width: 100vw; padding: 15px; box-sizing: border-box; gap: 15px; }

        /* 左カラム: 時計・天気・グラフ */
        .sidebar { width: 35%; display: flex; flex-direction: column; gap: 10px; }
        .clock { text-align: center; }
        .time { font-size: 14vh; font-weight: 100; line-height: 1; }
        .date { font-size: 3vh; color: #aaa; margin-top: 5px; }
        
        .weather-panel { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; flex-shrink: 0; }
        .hourly-forecast { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .hourly-item { flex: 0 0 60px; text-align: center; }
        .hour-txt { font-size: 1.5vh; color: #888; }
        .hour-emoji { font-size: 3vh; margin: 4px 0; }
        .hour-temp { font-size: 2vh; font-weight: bold; }

        .graph-panel { flex: 1; min-height: 0; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 12px; padding: 8px; position: relative; }
        canvas { width: 100% !important; height: 100% !important; }

        /* 右カラム: カレンダー */
        .main { flex: 1; display: flex; flex-direction: column; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .cal-header { display: flex; height: 10%; background: rgba(255,255,255,0.1); border-bottom: 1px solid #444; }
        .cal-day-label { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 2vh; font-weight: bold; border-right: 1px solid #333; }
        .cal-body { flex: 1; display: flex; position: relative; }
        .cal-lane { flex: 1; border-right: 1px solid #222; position: relative; }
        .cal-event { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 4px; font-size: 1.4vh; color: white; line-height: 1.2; overflow: hidden; box-sizing: border-box; }
        .now-line { position: absolute; left: 0; right: 0; height: 2px; background: rgba(255,255,0,0.8); z-index: 10; box-shadow: 0 0 5px yellow; }
    </style>
</head>
<body>
<div id="app">
    <div class="sidebar">
        <div class="clock">
            <div class="time">{{ uiState.currentTime || '--:--' }}</div>
            <div class="date">{{ uiState.currentDate || 'Loading...' }}</div>
        </div>
        
        <div v-if="uiState.weather" class="weather-panel">
            <div class="hourly-forecast">
                <div v-for="h in uiState.weather.hourlyForecast.slice(uiState.currentHour, uiState.currentHour + 24)" class="hourly-item">
                    <div class="hour-txt">{{ h.time }}</div>
                    <div class="hour-emoji">{{ getWeatherEmoji(h.condition, h.isNight) }}</div>
                    <div class="hour-temp">{{ Math.round(h.temp) }}℃</div>
                </div>
            </div>
        </div>

        <div class="graph-panel">
            <canvas id="pChart"></canvas>
        </div>
    </div>

    <div class="main">
        <div class="cal-header">
            <div v-for="d in 4" class="cal-day-label" :style="d==1 ? 'color:yellow':''">
                {{ getDayLabel(d-1) }}
            </div>
        </div>
        <div class="cal-body">
            <div class="now-line" :style="{ top: nowPos + '%' }"></div>
            <div v-for="dayIdx in 4" class="cal-lane">
                <div v-for="ev in getPlacedEvents(dayIdx-1)" class="cal-event" 
                     :style="{ top: ev.top + '%', height: ev.height + '%', background: ev.color + 'cc' }">
                    <b>{{ ev.title }}</b>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, watch } = Vue;

    createApp({
        setup() {
            const uiState = ref({ currentTime: '', currentDate: '', weather: null, calendarEvents: [], currentHour: 0 });
            const nowPos = ref(0);
            let chart = null;

            const context = cast.framework.CastReceiverContext.getInstance();
            context.addCustomMessageListener('urn:x-cast:jp.kyogg.weatherinfo', (event) => {
                try {
                    const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                    uiState.value = data;
                } catch(e) { console.error("Data error", e); }
            });
            context.start();

            const updateNow = () => {
                const n = new Date();
                nowPos.value = (n.getHours() * 60 + n.getMinutes()) / 1440 * 100;
            };

            const getDayLabel = (offset) => {
                const d = new Date(); d.setDate(d.getDate() + offset);
                return (d.getMonth()+1) + '/' + d.getDate() + (offset==0 ? '(今日)':'');
            };

            const getWeatherEmoji = (c, isNight) => {
                if(!c) return '❓';
                const main = c.split('_')[0];
                if(main === 'Clear') return isNight ? '🌙' : '☀️';
                return {'Clear':'☀️','Clouds':'☁️','Rain':'☔','Snow':'❄️'}[main] || '❓';
            };

            const getPlacedEvents = (dayOffset) => {
                if(!uiState.value.calendarEvents) return [];
                const d = new Date(); d.setHours(0,0,0,0);
                const start = d.getTime() + (dayOffset * 86400000);
                const end = start + 86400000;

                return uiState.value.calendarEvents
                    .filter(e => e.start < end && e.end > start && !e.allDay)
                    .map(e => {
                        const s = Math.max(start, e.start);
                        const top = (new Date(s).getHours() * 60 + new Date(s).getMinutes()) / 1440 * 100;
                        const duration = (Math.min(end, e.end) - s) / 60000;
                        return { title: e.title, color: e.color, top, height: Math.max(3, duration / 1440 * 100) };
                    });
            };

            watch(() => uiState.value.weather, (w) => {
                if (!w || !w.hourlyForecast) return;
                const ctx = document.getElementById('pChart').getContext('2d');
                if (chart) chart.destroy();
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: w.hourlyForecast.slice(0, 24).map(h => h.time),
                        datasets: [{ data: w.hourlyForecast.slice(0, 24).map(h => h.pressure), borderColor: '#00BFFF', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.3 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: '#333' } } } }
                });
            }, { deep: true });

            onMounted(() => {
                setInterval(updateNow, 60000);
                updateNow();
            });

            return { uiState, nowPos, getDayLabel, getWeatherEmoji, getPlacedEvents };
        }
    }).mount('#app');
</script>
</body>
</html>
